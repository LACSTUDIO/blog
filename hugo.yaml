baseurl: https://xn--9krq6q.xn--5brr03o.top/ # 网站的基本URL
languageCode: zh-cn  # 网站的语言代码
theme: hugo-theme-stack  # 使用的主题
paginate: 3  # 每页显示的文章数量
title: 领创博客  # 网站的标题
copyright: © 2024 领创工作室  # 版权信息

# Theme i18n support
# Available values: ar, bn, ca, de, el, en, es, fr, hu, id, it, ja, ko, nl, pt-br, th, uk, zh-cn, zh-hk, zh-tw
DefaultContentLanguage: zh-cn  # 默认内容语言

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage: false  # 是否启用CJK语言支持

languages:  # 多语言配置

    zh-cn:  # 中文配置
        languageName: 中文  # 语言名称
        title: 领创博客  # 页面标题
        weight: 1  # 排序权重
        params:  # 参数配置
            description: 领创博客 #描述信息

services:  # 服务配置
    # Change it to your Disqus shortname before using
    disqus:  # Disqus配置
        shortname: "hugo-theme-stack"  # Disqus短名称
    # GA Tracking ID
    googleAnalytics:  # Google Analytics配置
        id:  # Google Analytics跟踪ID

permalinks:  # 永久链接配置
    post: /p/:slug/  # 文章的永久链接格式
    page: /:slug/  # 页面的永久链接格式
params:  # 参数配置
    mainSections:  # 主要部分
        - post
    featuredImageField: image  # 特色图片字段
    rssFullContent: true  # RSS 全文内容
    favicon: /favicon.ico  # 网站图标

    footer:  # 页脚配置
        since: 2024  # 指定开始年份
        customText:  # 自定义文本

    dateFormat:  # 日期格式
        published: Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:  # 侧边栏配置
        emoji:  # 侧边栏图标
        subtitle: 主要分享一些刷机玩机的教程和心得。 # 侧边栏副标题
        avatar:  # 头像配置
            enabled: true  # 是否启用头像
            local: false  # 头像是否为本地资源
            src: /img/avatar.png  # 头像图片路径

    article:  # 文章配置
        math: false
        toc: true
        readingTime: true
        license:
            enabled: true
            default: Licensed under CC BY-NC-SA 4.0

    comments:  # 评论配置
        enabled: false
        provider: disqus

        disqusjs:
            shortname:
            apiUrl:
            apiKey:
            admin:
            adminLabel:

        utterances:
            repo:
            issueTerm: pathname
            label:

        beaudar:
            repo:
            issueTerm: pathname
            label:
            theme:        

        remark42:
            host:
            site:
            locale:

        vssue:
            platform:
            owner:
            repo:
            clientId:
            clientSecret:
            autoCreateIssue: false

        # Waline client configuration see: https://waline.js.org/en/reference/component.html
        waline:
            serverURL:
            lang:
            pageview:
            emoji:
                - https://unpkg.com/@waline/emojis@1.0.1/weibo
            requiredMeta:
                - name
                - email
                - url
            locale:
                admin: Admin
                placeholder:

        twikoo:
            envId:
            region:
            path:
            lang:

        # See https://cactus.chat/docs/reference/web-client/#configuration for description of the various options
        cactus:
            defaultHomeserverUrl: "https://matrix.cactus.chat:8448"
            serverName: "cactus.chat"
            siteName: "" # You must insert a unique identifier here matching the one you registered (See https://cactus.chat/docs/getting-started/quick-start/#register-your-site)

        giscus:
            repo:
            repoID:
            category:
            categoryID:
            mapping:
            lightTheme:
            darkTheme:
            reactionsEnabled: 1
            emitMetadata: 0

        gitalk:
            owner:
            admin:
            repo:
            clientID:
            clientSecret:

        cusdis:
            host:
            id:
    widgets:  # 小部件配置
        homepage:
            - type: search
            - type: archives
              params:
                  limit: 5
            - type: categories
              params:
                  limit: 10
            - type: tag-cloud
              params:
                  limit: 10
        page:
            - type: toc

    opengraph:  # Open Graph配置
        twitter:
            # Your Twitter username
            site:

            # Available values: summary, summary_large_image
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:  # 颜色方案配置
        # Display toggle
        toggle: true

        # Available values: auto, light, dark
        default: auto

    imageProcessing:  # 图像处理配置
        cover:
            enabled: true
        content:
            enabled: true

### Custom menu
# 自定义菜单
### See https://stack.jimmycai.com/config/menu
# 参考链接
### To remove about, archive and search page menu item, remove `menu` field from their FrontMatter
# 如果要移除关于、存档和搜索页面的菜单项，请从它们的 FrontMatter 中移除 `menu` 字段
menu:  # 菜单配置
    main: []

    social:
    
        - identifier: blibli
          name: blibli
          url: https://space.bilibili.com/1779662818
          params:
              icon: blibli

        - identifier: QQ
          name: QQ
          url: https://qm.qq.com/q/VIvkX8nMMU
          params:
              icon: QQ

        - identifier: more
          name: more
          url: /about/
          params:
              icon: lx

        - identifier: yc
          name: 远程刷机
          url: /yc/
          params:
              icon: yc

related:  # 相关内容配置
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 200

markup:  # 标记配置
    goldmark:
        renderer:
            ## Set to true if you have HTML content inside Markdown
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4